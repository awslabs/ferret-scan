# Ferret Scanner Configuration File
# https://github.com/awslabs/ferret-scan
#
# Place as: ferret.yaml, .ferret.yaml, or .ferret-scan.yaml in your project root
# Or specify with: ferret-scan --config path/to/ferret.yaml
#
# CLI reference (all flags): ferret-scan --help
# Web mode: ferret-scan --web [--port 8080] [--bind 0.0.0.0]
#
# Available checks:
#   CLOUD_RESOURCES, CREDIT_CARD, EMAIL, INTELLECTUAL_PROPERTY, IP_ADDRESS,
#   METADATA, PASSPORT, PERSON_NAME, PHONE, SECRETS, SOCIAL_MEDIA, SSN, VIN
#   Use "all" to enable every check.
#
# Output formats: text, json, csv, yaml, junit, gitlab-sast, sarif
#
# Confidence levels: high, medium, low (or "all" / comma-separated combos)

# ─────────────────────────────────────────────────────────────────────────────
# Default settings (applied when no --profile is specified)
# ─────────────────────────────────────────────────────────────────────────────
defaults:
  format: text
  confidence_levels: high,medium
  checks: all
  verbose: false
  debug: false
  no_color: false
  recursive: true
  enable_preprocessors: true   # Text extraction from PDF/Office documents
  show_match: false            # Display matched text in findings (redacted by default)
  quiet: false                 # Suppress progress output
  show_suppressed: false       # Include suppressed findings in output
  generate_suppressions: false # Generate suppression rules for all findings
  respect_gitignore: true      # Honor .gitignore, .git/info/exclude, global git excludes

  # --explain (CLI flag only; not a YAML option)
  #   Annotates each finding with a plain-language rationale, a verdict
  #   (likely real / test / uncertain), and a drafted suppression reason.
  #   Fully offline; no data leaves the host.
  #   Web mode always runs explain automatically.

  # Exclude patterns — directories and files to skip during scanning.
  # These supplement .gitignore when respect_gitignore is enabled.
  # For non-git directories these are the primary exclusion mechanism.
  exclude_patterns:
    # ── Version control internals ──
    - .git
    - .svn

    # ── Build outputs and caches ──
    - .cache
    - __pycache__
    - .pytest_cache
    - .mypy_cache
    - .ruff_cache
    - .tox
    - .nyc_output
    - _build
    - site
    - cdk.out
    - dist
    - out
    - .output
    - test-results
    - reports

    # ── Framework build/cache directories ──
    - .next
    - .nuxt
    - .svelte-kit
    - .turbo
    - .docusaurus
    - .terraform

    # ── Dependencies (third-party, not user-authored) ──
    - node_modules
    - .pnpm-store
    - .yarn
    - bower_components
    - vendor
    - Pods
    - venv
    - .venv
    - .virtualenv

    # ── Compiled/temporary files ──
    - tmp
    - temp
    - logs
    - "*.log"
    - "*.pyc"
    - "*.pyo"
    - "*.swp"
    - "*.swo"

    # ── Lock files (auto-generated, no PII signal) ──
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    - poetry.lock
    - Pipfile.lock
    - Gemfile.lock
    - .terraform.lock.hcl
    - terraform.tfstate
    - cdk.context.json

    # ── OS-generated metadata ──
    - .DS_Store
    - Thumbs.db

    # ── Security tooling output ──
    - .ferret-scan-suppressions.yaml

# ─────────────────────────────────────────────────────────────────────────────
# Preprocessor configurations
# ─────────────────────────────────────────────────────────────────────────────
preprocessors:
  text_extraction:
    enabled: true
    types:
      - pdf
      - office

# ─────────────────────────────────────────────────────────────────────────────
# Redaction configurations (activated with --enable-redaction or profile)
# ─────────────────────────────────────────────────────────────────────────────
redaction:
  enabled: false
  output_dir: ./redacted
  strategy: format_preserving   # Options: simple, format_preserving, synthetic
  audit_log_file: ""
  memory_scrub: true
  audit_trail: true

  strategies:
    simple:
      replacement: "[REDACTED]"
    format_preserving:
      preserve_length: true
      preserve_format: true
    synthetic:
      secure: true

# ─────────────────────────────────────────────────────────────────────────────
# Validator configurations
# ─────────────────────────────────────────────────────────────────────────────
validators:
  intellectual_property:
    # Disable specific IP sub-types if they generate noise in your codebase.
    # Valid values: copyright, patent, trademark, trade_secret, internal_url
    # disabled_types:
    #   - copyright

    # Internal URL patterns — customize for your organization.
    # Uncomment and modify the patterns relevant to your infrastructure.
    internal_urls:
      # AWS S3 (public service — detects S3 bucket URLs in your codebase)
      - "http[s]?:\\/\\/s3\\.amazonaws\\.com"
      - "http[s]?:\\/\\/.*\\.s3\\.amazonaws\\.com"
      - "http[s]?:\\/\\/.*\\.s3-.*\\.amazonaws\\.com"
      # Corporate network patterns (generic, works for most orgs)
      - "http[s]?:\\/\\/.*\\.internal\\..*"
      - "http[s]?:\\/\\/.*\\.corp\\..*"
      - "http[s]?:\\/\\/.*-internal\\..*"
      - "http[s]?:\\/\\/.*internal-.*"
      # Cloud infrastructure (uncomment what applies)
      # - "http[s]?:\\/\\/.*\\.blob\\.core\\.windows\\.net"
      # - "http[s]?:\\/\\/.*\\.appspot\\.com"

    intellectual_property_patterns:
      patent: "\\b(US|EP|JP|CN|WO)[ -]?(\\d{1,3}[,.]?\\d{3}[,.]?\\d{3}|\\d{1,3}[,.]?\\d{3}[,.]?\\d{2}[A-Z]\\d?)\\b"
      trademark: "\\b(\\w+\\s*[™®]|\\w+\\s*\\(TM\\)|\\w+\\s*\\(R\\)|\\w+\\s+Trademark|\\w+\\s+Registered\\s+Trademark)\\b"
      copyright: "(©|\\(c\\)|\\(C\\)|Copyright|\\bCopyright\\b)\\s*\\d{4}[-,]?(\\d{4})?\\s+[A-Za-z0-9\\s\\.,]+"
      # trade_secret: Match explicit classification markings only (not generic words)
      trade_secret: "\\b(Trade\\s+Secret|Company\\s+Confidential|Internal\\s+Use\\s+Only|CONFIDENTIAL\\s*[-–—:]\\s*(DO\\s+NOT|NOT\\s+FOR)|RESTRICTED\\s*[-–—:]\\s*(DO\\s+NOT|NOT\\s+FOR)|PROPRIETARY\\s+AND\\s+CONFIDENTIAL)\\b"

  social_media:
    platform_patterns:
      linkedin:
        - "(?i)https?://(?:www\\.)?linkedin\\.com/in/[a-zA-Z0-9_-]+"
        - "(?i)https?://(?:www\\.)?linkedin\\.com/company/[a-zA-Z0-9_-]+"
      twitter:
        - "(?i)https?://(?:www\\.)?(twitter|x)\\.com/[a-zA-Z0-9_]+"
        - "(?i)@[a-zA-Z0-9_]{1,15}\\b"
      facebook:
        - "(?i)https?://(?:www\\.)?(facebook|fb)\\.com/[a-zA-Z0-9._-]+"
      instagram:
        - "(?i)https?://(?:www\\.)?instagram\\.com/[a-zA-Z0-9_.]+/"
      youtube:
        - "(?i)https?://(?:www\\.)?youtube\\.com/(?:user|c|channel)/[a-zA-Z0-9_-]+"
        - "(?i)https?://(?:www\\.)?youtube\\.com/@[a-zA-Z0-9_-]+"

    positive_keywords:
      - profile
      - follow me
      - connect with me
      - find me on
      - contact
    negative_keywords:
      - example
      - test
      - placeholder
      - demo
      - sample
      - mock
      - template

# ─────────────────────────────────────────────────────────────────────────────
# Suppression configuration
# ─────────────────────────────────────────────────────────────────────────────
suppressions:
  file: .ferret-scan-suppressions.yaml
  generate_on_scan: false
  show_suppressed: false

# ─────────────────────────────────────────────────────────────────────────────
# Profiles
# ─────────────────────────────────────────────────────────────────────────────
# Use with: ferret-scan --profile <name> --file <target>
#
# The "defaults" section above defines the baseline. Profiles override specific
# settings. Unlisted settings inherit from defaults.

profiles:
  # ── CLI (matches defaults — explicit for clarity) ────────────────────────
  # Standard interactive terminal use. Human-readable text output.
  cli:
    format: text
    confidence_levels: high,medium
    checks: all
    verbose: false
    recursive: true
    enable_preprocessors: true
    respect_gitignore: true
    description: "Default CLI scan — human-readable text output with standard detection"

  # ── Web ──────────────────────────────────────────────────────────────────
  # Optimized for ferret-scan --web mode.
  # Web mode always runs --explain automatically and returns JSON to the UI.
  # The UI handles redaction client-side; show_match:true delivers raw data.
  web:
    format: json
    confidence_levels: all
    checks: all
    verbose: true
    recursive: true
    enable_preprocessors: true
    show_match: true
    no_color: true
    respect_gitignore: true
    description: "Web UI mode — JSON output with full detail; UI handles display and client-side redaction"

  # ── CI/CD ────────────────────────────────────────────────────────────────
  # Machine-readable output for pipelines. Use format: gitlab-sast for GitLab
  # Security Dashboard, junit for Jenkins/generic CI, or sarif for GitHub/Azure.
  ci:
    format: gitlab-sast
    confidence_levels: high,medium
    checks: all
    verbose: false
    no_color: true
    recursive: true
    enable_preprocessors: true
    quiet: true
    show_match: false
    show_suppressed: false
    respect_gitignore: true
    description: "CI/CD pipeline — quiet, machine-readable output (change format to junit/sarif as needed)"

  # ── Pre-commit ───────────────────────────────────────────────────────────
  # Fast, focused scan for git pre-commit hooks. Non-recursive (only staged files).
  precommit:
    format: text
    confidence_levels: high,medium
    checks: CREDIT_CARD,SECRETS,SSN,PASSPORT,EMAIL,PERSON_NAME
    verbose: false
    no_color: true
    recursive: false
    quiet: true
    show_match: false
    enable_preprocessors: true
    respect_gitignore: true
    description: "Pre-commit hook — fast scan of staged files for critical PII types"

  # ── Redaction ────────────────────────────────────────────────────────────
  # Scan and redact sensitive data in-place (writes to output_dir).
  redaction:
    format: text
    confidence_levels: high,medium
    checks: all
    verbose: true
    recursive: true
    enable_preprocessors: true
    respect_gitignore: true
    show_match: false
    description: "Scan and redact sensitive data with format-preserving replacement"
    redaction:
      enabled: true
      output_dir: ./redacted
      strategy: format_preserving
