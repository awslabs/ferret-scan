# Ferret Scanner Configuration File - Windows Edition
# https://github.com/awslabs/ferret-scan
#
# This is the Windows variant of the example config. It mirrors ferret.yaml
# but adds Windows platform settings and uses Windows-style paths.
#
# Place as: ferret.yaml or .ferret-scan.yaml in your project root
# Or specify with: ferret-scan.exe --config path\to\ferret-windows.yaml
#
# Windows environment variable reference:
#   %APPDATA%       → C:\Users\<user>\AppData\Roaming
#   %LOCALAPPDATA%  → C:\Users\<user>\AppData\Local
#   %USERPROFILE%   → C:\Users\<user>
#   %PROGRAMDATA%   → C:\ProgramData
#   %TEMP%          → C:\Users\<user>\AppData\Local\Temp

# ─────────────────────────────────────────────────────────────────────────────
# Default settings
# ─────────────────────────────────────────────────────────────────────────────
defaults:
  format: text
  confidence_levels: high,medium
  checks: all
  verbose: false
  debug: false
  no_color: false
  recursive: true
  enable_preprocessors: true
  show_match: false
  quiet: false
  show_suppressed: false
  generate_suppressions: false
  respect_gitignore: true

  # --explain (CLI flag only; not a YAML option)
  #   Web mode always runs explain automatically.

  exclude_patterns:
    # ── Version control ──
    - .git
    - .svn

    # ── Build outputs and caches ──
    - .cache
    - __pycache__
    - .pytest_cache
    - .mypy_cache
    - .ruff_cache
    - .tox
    - .nyc_output
    - _build
    - site
    - cdk.out
    - dist
    - out
    - .output
    - test-results
    - reports

    # ── Framework build/cache directories ──
    - .next
    - .nuxt
    - .svelte-kit
    - .turbo
    - .docusaurus
    - .terraform

    # ── Dependencies ──
    - node_modules
    - .pnpm-store
    - .yarn
    - bower_components
    - vendor
    - Pods
    - venv
    - .venv
    - .virtualenv

    # ── Compiled/temporary files ──
    - tmp
    - temp
    - logs
    - "*.log"
    - "*.pyc"
    - "*.pyo"
    - "*.swp"
    - "*.swo"

    # ── Lock files ──
    - package-lock.json
    - yarn.lock
    - pnpm-lock.yaml
    - poetry.lock
    - Pipfile.lock
    - Gemfile.lock
    - .terraform.lock.hcl
    - terraform.tfstate
    - cdk.context.json

    # ── OS-generated metadata ──
    - .DS_Store
    - Thumbs.db
    - desktop.ini

    # ── Security tooling output ──
    - .ferret-scan-suppressions.yaml

# ─────────────────────────────────────────────────────────────────────────────
# Windows platform configuration
# ─────────────────────────────────────────────────────────────────────────────
platform:
  windows:
    use_appdata: true           # Store config in %APPDATA%\ferret-scan\
    system_wide_install: false  # Per-user install (set true for enterprise GPO deployment)
    create_shortcuts: false
    add_to_path: false
    config_dir: ""              # Leave empty to use default (%APPDATA%\ferret-scan)
    temp_dir: ""                # Leave empty to use %TEMP%
    long_path_support: false    # Enable for repos with paths >260 chars

# ─────────────────────────────────────────────────────────────────────────────
# Preprocessors
# ─────────────────────────────────────────────────────────────────────────────
preprocessors:
  text_extraction:
    enabled: true
    types:
      - pdf
      - office

# ─────────────────────────────────────────────────────────────────────────────
# Redaction (Windows paths)
# ─────────────────────────────────────────────────────────────────────────────
redaction:
  enabled: false
  output_dir: "%USERPROFILE%\\Documents\\ferret-redacted"
  strategy: format_preserving
  audit_log_file: "%LOCALAPPDATA%\\ferret-scan\\audit.log"
  memory_scrub: true
  audit_trail: true

  strategies:
    simple:
      replacement: "[REDACTED]"
    format_preserving:
      preserve_length: true
      preserve_format: true
    synthetic:
      secure: true

# ─────────────────────────────────────────────────────────────────────────────
# Validators
# ─────────────────────────────────────────────────────────────────────────────
validators:
  intellectual_property:
    internal_urls:
      # AWS S3
      - "http[s]?:\\/\\/s3\\.amazonaws\\.com"
      - "http[s]?:\\/\\/.*\\.s3\\.amazonaws\\.com"
      - "http[s]?:\\/\\/.*\\.s3-.*\\.amazonaws\\.com"
      # Corporate patterns
      - "http[s]?:\\/\\/.*\\.internal\\..*"
      - "http[s]?:\\/\\/.*\\.corp\\..*"
      - "http[s]?:\\/\\/.*-internal\\..*"
      - "http[s]?:\\/\\/.*internal-.*"
      # Windows/Microsoft infrastructure (uncomment what applies)
      # - "http[s]?:\\/\\/.*\\.domain\\.local"
      # - "http[s]?:\\/\\/sharepoint\\..*"
      # - "http[s]?:\\/\\/teams\\..*"

    intellectual_property_patterns:
      patent: "\\b(US|EP|JP|CN|WO)[ -]?(\\d{1,3}[,.]?\\d{3}[,.]?\\d{3}|\\d{1,3}[,.]?\\d{3}[,.]?\\d{2}[A-Z]\\d?)\\b"
      trademark: "\\b(\\w+\\s*[™®]|\\w+\\s*\\(TM\\)|\\w+\\s*\\(R\\)|\\w+\\s+Trademark|\\w+\\s+Registered\\s+Trademark)\\b"
      copyright: "(©|\\(c\\)|\\(C\\)|Copyright|\\bCopyright\\b)\\s*\\d{4}[-,]?(\\d{4})?\\s+[A-Za-z0-9\\s\\.,]+"
      trade_secret: "\\b(Trade\\s+Secret|Company\\s+Confidential|Internal\\s+Use\\s+Only|CONFIDENTIAL\\s*[-–—:]\\s*(DO\\s+NOT|NOT\\s+FOR)|RESTRICTED\\s*[-–—:]\\s*(DO\\s+NOT|NOT\\s+FOR)|PROPRIETARY\\s+AND\\s+CONFIDENTIAL)\\b"

  social_media:
    platform_patterns:
      linkedin:
        - "(?i)https?://(?:www\\.)?linkedin\\.com/in/[a-zA-Z0-9_-]+"
        - "(?i)https?://(?:www\\.)?linkedin\\.com/company/[a-zA-Z0-9_-]+"
      twitter:
        - "(?i)https?://(?:www\\.)?(twitter|x)\\.com/[a-zA-Z0-9_]+"
        - "(?i)@[a-zA-Z0-9_]{1,15}\\b"
      facebook:
        - "(?i)https?://(?:www\\.)?(facebook|fb)\\.com/[a-zA-Z0-9._-]+"
      instagram:
        - "(?i)https?://(?:www\\.)?instagram\\.com/[a-zA-Z0-9_.]+/"
      youtube:
        - "(?i)https?://(?:www\\.)?youtube\\.com/(?:user|c|channel)/[a-zA-Z0-9_-]+"
        - "(?i)https?://(?:www\\.)?youtube\\.com/@[a-zA-Z0-9_-]+"

    positive_keywords:
      - profile
      - follow me
      - connect with me
      - find me on
      - contact
    negative_keywords:
      - example
      - test
      - placeholder
      - demo
      - sample
      - mock
      - template

# ─────────────────────────────────────────────────────────────────────────────
# Suppressions (Windows default path)
# ─────────────────────────────────────────────────────────────────────────────
suppressions:
  file: .ferret-scan-suppressions.yaml
  generate_on_scan: false
  show_suppressed: false

# ─────────────────────────────────────────────────────────────────────────────
# Profiles
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  # ── CLI ──────────────────────────────────────────────────────────────────
  cli:
    format: text
    confidence_levels: high,medium
    checks: all
    verbose: false
    recursive: true
    enable_preprocessors: true
    respect_gitignore: true
    description: "Default CLI scan — human-readable text output"
    platform:
      windows:
        use_appdata: true
        long_path_support: true

  # ── Web ──────────────────────────────────────────────────────────────────
  web:
    format: json
    confidence_levels: all
    checks: all
    verbose: true
    recursive: true
    enable_preprocessors: true
    show_match: true
    no_color: true
    respect_gitignore: true
    description: "Web UI mode — JSON output; UI handles client-side redaction"

  # ── CI/CD ────────────────────────────────────────────────────────────────
  # Works with Azure DevOps, GitHub Actions on Windows runners, GitLab CI.
  ci:
    format: gitlab-sast
    confidence_levels: high,medium
    checks: all
    no_color: true
    recursive: true
    enable_preprocessors: true
    quiet: true
    show_match: false
    show_suppressed: false
    respect_gitignore: true
    description: "CI/CD pipeline — quiet, machine-readable output (change format to junit/sarif as needed)"
    platform:
      windows:
        use_appdata: false
        temp_dir: "%TEMP%\\ferret-scan"

  # ── Pre-commit ───────────────────────────────────────────────────────────
  precommit:
    format: text
    confidence_levels: high,medium
    checks: CREDIT_CARD,SECRETS,SSN,PASSPORT,EMAIL,PERSON_NAME
    verbose: false
    no_color: true
    recursive: false
    quiet: true
    show_match: false
    enable_preprocessors: true
    respect_gitignore: true
    description: "Pre-commit hook — fast scan of staged files for critical PII types"

  # ── Redaction ────────────────────────────────────────────────────────────
  redaction:
    format: text
    confidence_levels: high,medium
    checks: all
    verbose: true
    recursive: true
    enable_preprocessors: true
    respect_gitignore: true
    show_match: false
    description: "Scan and redact sensitive data with format-preserving replacement"
    redaction:
      enabled: true
      output_dir: "%USERPROFILE%\\Documents\\ferret-redacted"
      strategy: format_preserving
