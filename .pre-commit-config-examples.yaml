# Ferret Scan Pre-commit Configuration Examples
#
# Pick ONE option below and add it to your .pre-commit-config.yaml.
# All options exclude suppressions files (hashes trigger false positives).
#
# Prerequisite for local binary options: make build (creates bin/ferret-scan)

# =============================================================================
# OPTION A: REMOTE REPO (Recommended)
# =============================================================================
# Pulls ferret-scan from GitHub releases. No local build needed.
# Uses the "precommit" profile from your project's ferret.yaml config.
repos:
  - repo: https://github.com/awslabs/ferret-scan
    rev: v1.10.0  # pin to a release tag
    hooks:
      - id: ferret-scan
        args: [--pre-commit-mode, --profile, precommit, --respect-gitignore]

---
# =============================================================================
# OPTION B: LOCAL BINARY (Best performance)
# =============================================================================
# Uses a pre-built binary from bin/. Fastest option for large repos.
repos:
  - repo: local
    hooks:
      - id: ferret-scan
        name: Ferret Scan
        entry: ./bin/ferret-scan --pre-commit-mode --profile precommit --respect-gitignore
        language: system
        files: '\.(go|js|py|java|txt|md|yaml|yml|json|xml|sql|sh|ts|jsx|tsx|php|rb|c|cpp|h|hpp|cs|kt|swift|rs|scala|clj|pl|r|m|mm)$'
        exclude: '(^(\.git/|bin/|dist/|node_modules/|\.cache/|vendor/|\.venv/|__pycache__/))|((^|/)\.?ferret-scan-suppressions\.ya?ml$)|((^|/)(test_[^/]*|[^/]+_test)\.[^/]+$)'
        pass_filenames: true

---
# =============================================================================
# OPTION C: DOCKER / FINCH
# =============================================================================
# Runs in a container. No local Go toolchain or binary needed.
repos:
  - repo: local
    hooks:
      - id: ferret-scan
        name: Ferret Scan (Docker)
        entry: docker run --rm -v "${PWD}:/data" -w /data public.ecr.aws/awslabs/ferret-scan:latest --pre-commit-mode --profile precommit --respect-gitignore
        language: system
        files: '\.(go|js|py|java|txt|md|yaml|yml|json|xml|sql|sh|ts|jsx|tsx)$'
        exclude: '(^(\.git/|bin/|dist/|node_modules/|\.cache/|vendor/|\.venv/|__pycache__/))|((^|/)\.?ferret-scan-suppressions\.ya?ml$)'
        pass_filenames: true

---
# =============================================================================
# OPTION D: ADVISORY MODE (never blocks commits)
# =============================================================================
# Shows findings as warnings but always exits 0. Good for onboarding.
repos:
  - repo: local
    hooks:
      - id: ferret-scan-advisory
        name: Ferret Scan (Advisory)
        entry: ./bin/ferret-scan --pre-commit-mode --profile precommit --respect-gitignore --verbose
        language: system
        files: '\.(go|js|py|java|txt|md|yaml|yml|json|xml|sql|sh|ts|jsx|tsx)$'
        exclude: '(^(\.git/|bin/|dist/|node_modules/|\.cache/|vendor/|\.venv/|__pycache__/))|((^|/)\.?ferret-scan-suppressions\.ya?ml$)'
        pass_filenames: true
        verbose: true  # always show output even on success
        env:
          FERRET_PRECOMMIT_EXIT_ON: "none"
