# Project-sanctioned suppression rules for ferret-scan.
#
# This file is COMMITTED (see .gitignore exception) so all contributors
# and CI share the same baseline. Every rule below was auto-generated
# from running ferret-scan on the repo itself, then hand-reviewed.
#
# Categories of suppressed findings:
# - Validator help text (internal/validators/*/help.go): documentation
#   examples like phone format strings ("+1-555-..."), example IPs,
#   example email patterns. These are docstrings, not real PII.
# - Validator regex patterns (internal/validators/*/validator.go):
#   the actual regexes detect PII; the patterns themselves embed
#   sample fixtures in comments and string literals.
# - Redaction strategy examples (internal/redactors/.../*.go):
#   simple/synthetic strategy fixtures used as defaults.
# - Replacement library (internal/redactors/replacement/replacement.go):
#   example tokens for the replacement table.
# - Benchmark fixtures (internal/.../*benchmark*.go): synthetic
#   payloads for performance testing.
#
# Only HIGH-confidence rules (>=90) are enabled, matching the
# pre-commit hook policy (FERRET_PRECOMMIT_EXIT_ON=high). Lower-
# confidence rules are tracked but disabled — they re-flag if
# they cross the high-confidence threshold in a future change.
#
# To regenerate: ./bin/ferret-scan --suppression-file ./.ferret-scan-suppressions.yaml --generate-suppressions <files>
# To audit a specific rule: search by hash or filename below.

