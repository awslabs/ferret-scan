name: Build Python Package

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      package-path:
        description: "Path to built Python package"
        value: ${{ jobs.test-and-release.outputs.package-path }}

permissions:
  contents: write # Needed for creating releases

jobs:
  build:
    uses: ./.github/workflows/build-shared.yml
    with:
      build-type: "python"
    permissions:
      contents: read

  test-and-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # Needed for creating releases
    outputs:
      package-path: python-package/dist/

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Download Python package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ferret-scan-python-${{ github.sha }}
          path: python-package/dist/

      - name: Test installation and functionality
        run: |
          cd python-package
          pip install dist/*.whl

          # Test version
          ferret-scan --version

          # Test basic functionality
          echo "Test credit card: 4111-1111-1111-1111" > test.txt
          ferret-scan --file test.txt --confidence high || true
          rm test.txt

          # Test help
          ferret-scan --help | head -5

          echo "✅ Python package installation and basic functionality tests passed"

      - name: Upload Python package artifacts (final)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-release
          path: python-package/dist/
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: python-package/dist/*
          generate_release_notes: true
          body: |
            ## 🐍 Python Package Installation

            ```bash
            pip install ferret-scan
            ```

            ### Quick Start:
            ```bash
            ferret-scan --version
            ferret-scan --help
            ```

            **Requirements**: Python 3.7 or higher

            ---

            **Note**: The PyPI package will be available shortly after this release is published.

  # Publish to PyPI for tag pushes (trusted publisher should be configured for this workflow)
  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: test-and-release
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      contents: read
      id-token: write # Required for trusted publishing to PyPI

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine setuptools_scm

      - name: Download Python package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-release
          path: python-package/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (2026-04-07)
        with:
          packages-dir: python-package/dist/
          verbose: true
