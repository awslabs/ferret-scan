name: Shared Build

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Type of build: binary, python, or both'
        required: false
        default: 'binary'
        type: string
      go-version:
        description: 'Go version to use'
        required: false
        default: ''
        type: string
    outputs:
      binary-path:
        description: "Path to built binary"
        value: ${{ jobs.build.outputs.binary-path }}
      python-path:
        description: "Path to built Python package"
        value: ${{ jobs.build.outputs.python-path }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      binary-path: bin/ferret-scan
      python-path: python-package/dist/

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: ${{ inputs.go-version != '' && inputs.go-version || '.go-version' }}

    - name: Set up Python
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.13'

    - name: Cache Go modules
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build binary
      if: inputs.build-type == 'binary' || inputs.build-type == 'both'
      run: |
        make build
        chmod +x bin/ferret-scan

    - name: Build Python package
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      run: |
        python -m pip install --upgrade pip build
        cd python-package
        ./build-package.sh

    - name: Upload binary artifact
      if: inputs.build-type == 'binary' || inputs.build-type == 'both'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ferret-scan-binary-${{ github.sha }}
        path: bin/ferret-scan
        retention-days: 1

    - name: Upload Python package artifact
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ferret-scan-python-${{ github.sha }}
        path: python-package/dist/
        retention-days: 1
