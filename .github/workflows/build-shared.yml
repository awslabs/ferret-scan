name: Shared Build

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Type of build: binary, python, or both'
        required: false
        default: 'binary'
        type: string
      go-version:
        description: 'Go version to use'
        required: false
        default: ''
        type: string
    outputs:
      binary-path:
        description: "Path to built binary"
        value: ${{ jobs.build.outputs.binary-path }}
      python-path:
        description: "Path to built Python package"
        value: ${{ jobs.build.outputs.python-path }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      binary-path: bin/ferret-scan
      python-path: python-package/dist/

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ inputs.go-version != '' && inputs.go-version || '.go-version' }}

    - name: Set up Python
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Cache Go modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Build binary
      if: inputs.build-type == 'binary' || inputs.build-type == 'both'
      run: |
        make build
        chmod +x bin/ferret-scan

    - name: Build Python package
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      run: |
        python -m pip install --upgrade pip build
        cd python-package
        ./build-package.sh

    - name: Upload binary artifact
      if: inputs.build-type == 'binary' || inputs.build-type == 'both'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ferret-scan-binary-${{ github.sha }}
        path: bin/ferret-scan
        retention-days: 1

    - name: Upload Python package artifact
      if: inputs.build-type == 'python' || inputs.build-type == 'both'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ferret-scan-python-${{ github.sha }}
        path: python-package/dist/
        retention-days: 1
