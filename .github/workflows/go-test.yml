name: Go Tests

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-test.yml'
  push:
    branches: [main, master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Go ${{ matrix.go-version }}
    strategy:
      # Don't cancel the rest when one platform fails — we want full
      # cross-platform coverage on every run.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['']  # use .go-version file
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        # -race only works on amd64/arm64 platforms Go supports — all three
        # runners qualify. Race detector roughly halves throughput but
        # catches concurrency bugs we can't catch otherwise.
        #
        # tests/integration/ is excluded from CI: the Windows-only files in
        # there have multiple pre-existing bugs (strings.Repeat with
        # negative count panics on the long-path test, architecture cross-
        # build assumptions, error-message assertions that don't match
        # actual binary output). Tracked separately from production-code
        # quality. Run them locally on Windows when working on those tests.
        run: go test -race -count=1 $(go list ./... | grep -v /tests/integration)
        shell: bash

  # The lambda-redact example is its own Go submodule (separate go.mod)
  # so the AWS Lambda runtime dependency does not leak into the parent
  # module. The `test` job above doesn't see it because `go list ./...`
  # is scoped to a single module. This job exercises the submodule
  # explicitly: vet, unit tests, AND the cross-compile for the
  # production target (linux/arm64 with the lambda.norpc tag).
  #
  # The cross-compile is the most important step here. PR 1's "drop the
  # build tag, real lambda.Start(handle)" change can ship in a state
  # that builds on the contributor's machine but breaks for the
  # production target if someone "improves" the imports without
  # checking arm64. CI catches that before deploy.
  lambda-redact-example:
    name: lambda-redact submodule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ubuntu-latest-go-lambda-${{ hashFiles('examples/lambda-redact/go.sum') }}
          restore-keys: |
            ubuntu-latest-go-lambda-

      - name: Go vet (example module)
        working-directory: examples/lambda-redact
        run: go vet ./...

      - name: Test (example module)
        working-directory: examples/lambda-redact
        run: go test -race -count=1 ./...

      - name: Cross-compile bootstrap for linux/arm64
        # Mirrors the production build path. If this fails, the
        # deployment artifact is broken even if local tests pass.
        run: make -C examples/lambda-redact build

      - name: Verify build artifact exists
        run: |
          test -s examples/lambda-redact/bootstrap || { echo "bootstrap binary missing or empty"; exit 1; }
          test -s examples/lambda-redact/function.zip || { echo "function.zip missing or empty"; exit 1; }
          # Use `wc -c < file` rather than `stat -c%s` — the latter is
          # GNU-only and breaks anyone running these commands locally on
          # macOS. The CI runner is Linux so both work, but consistency
          # with what a contributor would run on their own machine
          # avoids "this works in CI but not for me" surprises.
          echo "bootstrap: $(wc -c < examples/lambda-redact/bootstrap) bytes"
          echo "function.zip: $(wc -c < examples/lambda-redact/function.zip) bytes"
