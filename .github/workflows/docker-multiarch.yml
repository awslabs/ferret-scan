name: Multi-Architecture Docker Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - '**.go'
      - 'internal/web/assets/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'cmd/**'
      - 'internal/**'
      - 'Makefile'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '**.go'
      - 'internal/web/assets/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'cmd/**'
      - 'internal/**'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      push_image:
        description: "Push image to registry"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write # Required for GHCR push
  security-events: write
  id-token: write # Required for AWS OIDC

env:
  ECR_REGISTRY: public.ecr.aws/g4m5x5s3
  ECR_REPOSITORY: ferret-scan
  GHCR_REGISTRY: ghcr.io
  GHCR_REPOSITORY: awslabs/ferret-scan

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for SBOM action to attach to releases
      packages: write # Required for GHCR push
      id-token: write # Required for AWS OIDC
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: all

      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-ECR-Push

      - name: Log in to Amazon ECR Public
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          registry-type: public

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GHCR access
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        env:
          ACTOR: ${{ github.actor }}
        run: |
          echo "🔍 Verifying GHCR access..."
          echo "Actor: $ACTOR"
          echo "Repository: ${{ github.repository }}"
          echo "Repository owner: ${{ github.repository_owner }}"

          # Test if we can access the repository
          if docker manifest inspect "ghcr.io/${GHCR_REPOSITORY}:latest" >/dev/null 2>&1; then
            echo "✅ Can access existing images"
          else
            echo "ℹ️ No existing images found (this is normal for first push)"
          fi

      - name: Extract metadata for multi-registry
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}
          tags: |
            # For tagged releases: create version tag + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # For main branch: create main tag (development builds)
            type=raw,value=main,enable={{is_default_branch}}
            # For PRs: only create PR tag (no push)
            type=ref,event=pr,enable=${{github.event_name == 'pull_request'}}
          labels: |
            org.opencontainers.image.title=Ferret Scan
            org.opencontainers.image.description=Multi-architecture sensitive data detection tool
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Determine platforms
        id: platforms
        # The platforms input is free-text workflow_dispatch input; pass via env
        # and reference as "$VAR" so it cannot inject shell commands (GitHub
        # Actions script-injection hardening).
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "platforms=$INPUT_PLATFORMS" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            # Only build for amd64 on PRs for faster feedback
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          else
            # Full multi-arch build for main branch and tags
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          # Only push on tags (releases) or main branch pushes, not PRs
          push: ${{ (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && (github.event.inputs.push_image != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Generate SBOM
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
        continue-on-error: true # Don't fail workflow if SBOM generation fails

      - name: Upload SBOM
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

      - name: Run Trivy vulnerability scanner
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.meta.outputs.version }}
          format: "sarif"
          output: "trivy-results.sarif"
          # Suppress accepted, non-actionable findings (see .trivyignore for the
          # rationale behind each entry — e.g. deprecated packages with no fix
          # that ferret-scan does not actually import).
          trivyignores: ".trivyignore"

      - name: Upload Trivy scan results to GitHub Security tab
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy-container-scan"
        continue-on-error: true # Don't fail the workflow if SARIF upload fails

      - name: Test multi-arch images
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        # PLATFORMS derives from the untrusted platforms input and IMAGE_VERSION
        # from the metadata action; pass via env and reference as "$VAR" so
        # neither can inject shell commands.
        env:
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          echo "🧪 Testing built images..."

          # Test each platform
          for platform in $(echo "$PLATFORMS" | tr ',' ' '); do
            echo "Testing $platform..."

            # Test GHCR image
            docker run --rm --platform="$platform" \
              "${GHCR_REGISTRY}/${GHCR_REPOSITORY}:${IMAGE_VERSION}" \
              --version || echo "⚠️ GHCR version check failed for $platform"

            docker run --rm --platform="$platform" \
              "${GHCR_REGISTRY}/${GHCR_REPOSITORY}:${IMAGE_VERSION}" \
              --help | head -5 || echo "⚠️ GHCR help check failed for $platform"
          done

      - name: Create release summary
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        # IMAGE_TAGS/PLATFORMS derive from the metadata action and the untrusted
        # platforms input; pass via env and reference as "$VAR" so they cannot
        # inject shell commands. The registry/repository names are workflow-level
        # env constants, referenced directly as shell vars.
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
        run: |
          echo "## 🐳 Multi-Architecture Docker Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Container Registries" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Amazon ECR Public" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${ECR_REGISTRY}/${ECR_REPOSITORY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Gallery:** https://gallery.ecr.aws/g4m5x5s3/ferret-scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### GitHub Container Registry" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${GHCR_REGISTRY}/${GHCR_REPOSITORY}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Packages:** https://github.com/awslabs/ferret-scan/pkgs/container/ferret-scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:** $IMAGE_TAGS" | tr ',' '\n' | sed 's/^/- `/' | sed 's/$/`/' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** $PLATFORMS" | tr ',' '\n' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Usage Examples:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "# Pull from GitHub Container Registry" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${GHCR_REGISTRY}/${GHCR_REPOSITORY}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Pull from Amazon ECR Public" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Run CLI mode" >> "$GITHUB_STEP_SUMMARY"
          echo "docker run --rm -v \$(pwd):/data ${GHCR_REGISTRY}/${GHCR_REPOSITORY}:latest --file /data/sample.txt" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "# Run web mode" >> "$GITHUB_STEP_SUMMARY"
          echo "docker run --rm -p 8080:8080 ${GHCR_REGISTRY}/${GHCR_REPOSITORY}:latest --web --port 8080" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  security-scan:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read # Required to pull from GHCR for scanning
      security-events: write

    steps:
      # Check out so Grype can read .grype.yaml (accepted-vuln ignore rules).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Authenticate to GHCR before grype attempts to pull the image.
      # Without this, anchore/scan-action@v7+ fails with
      #   "UNAUTHORIZED: authentication required"
      # because the GHCR package is private by default and the v7 grype
      # resolver requires explicit auth on the oci-registry path.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Grype vulnerability scanner on GHCR
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan-ghcr
        with:
          image: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:latest
          fail-build: false
          severity-cutoff: high
          # Load accepted-vuln ignore rules (see .grype.yaml for rationale).
          config: ".grype.yaml"

      - name: Upload Grype scan results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: ${{ steps.scan-ghcr.outputs.sarif }}
          category: "grype-container-scan"
        continue-on-error: true # Don't fail the workflow if SARIF upload fails
