name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Build snapshot release"
        required: false
        default: "false"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ".go-version"

      - name: Install git-chglog
        # Pinned to an exact version (not @latest) so a compromised newer release
        # can't be pulled into this privileged release job (contents:write +
        # packages:write). Go's sumdb does not protect against a maliciously
        # published new version. Bump deliberately after review. (MED-4)
        run: go install github.com/git-chglog/git-chglog/cmd/git-chglog@v0.15.4

      - name: Generate/Update Changelog
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "📝 Generating initial changelog..."
            git-chglog --output CHANGELOG.md
          else
            echo "📝 Updating changelog..."
            git-chglog --output CHANGELOG.md
          fi

      - name: Commit Changelog
        run: |
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            echo "📝 Committing updated changelog..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: update changelog for ${GITHUB_REF_NAME:-snapshot}"
          fi

      - name: Run GoReleaser (Release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



      - name: Run GoReleaser (Snapshot)
        if: github.event.inputs.snapshot == 'true' || (github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/'))
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Snapshot Artifacts
        if: github.event.inputs.snapshot == 'true' || (github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapshot-binaries
          path: dist/*
          retention-days: 7
