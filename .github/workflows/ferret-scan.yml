# Ferret Scan GitHub Actions Workflow
# Comprehensive sensitive data detection for pull requests and main branch

name: Ferret Scan Security Check

on:
  # Run on pull requests
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.go'
      - '**.java'
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '**.env'
      - '**.conf'
      - '**.config'

  # Run on pushes to main branch
  push:
    branches: [main, master]

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      scan_scope:
        description: 'Scan scope'
        required: false
        default: 'changed-files'
        type: choice
        options:
          - 'changed-files'
          - 'full-repository'
      confidence_level:
        description: 'Confidence level'
        required: false
        default: 'high,medium'
        type: choice
        options:
          - 'high'
          - 'high,medium'
          - 'all'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    uses: ./.github/workflows/build-shared.yml
    with:
      build-type: 'binary'
    permissions:
      contents: read

  ferret-scan:
    name: Sensitive Data Detection
    runs-on: ubuntu-latest
    needs: build

    # Set permissions for the job
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Fetch full history for better analysis
          fetch-depth: 0

      - name: Download binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ferret-scan-binary-${{ github.sha }}
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ferret-scan

      - name: Determine scan scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scope=${{ github.event.inputs.scan_scope }}" >> $GITHUB_OUTPUT
            echo "confidence=${{ github.event.inputs.confidence_level }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scope=changed-files" >> $GITHUB_OUTPUT
            echo "confidence=high,medium" >> $GITHUB_OUTPUT
          else
            echo "scope=full-repository" >> $GITHUB_OUTPUT
            echo "confidence=high,medium" >> $GITHUB_OUTPUT
          fi

      - name: Get changed files (PR only)
        if: steps.scope.outputs.scope == 'changed-files'
        id: changed-files
        run: |
          # Get list of changed files in the PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For pull requests, compare against the base branch
            git diff --name-only --diff-filter=ACM \
              ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} \
              | grep -E '\.(py|js|ts|go|java|json|yaml|yml|env|conf|config)$' \
              | grep -v -E '(test_|_test\.|spec_|_spec\.|mock_|_mock\.)' \
              > changed_files.txt || true
          else
            # For pushes, compare against the previous commit
            git diff --name-only --diff-filter=ACM HEAD~1 HEAD \
              | grep -E '\.(py|js|ts|go|java|json|yaml|yml|env|conf|config)$' \
              | grep -v -E '(test_|_test\.|spec_|_spec\.|mock_|_mock\.)' \
              > changed_files.txt || true
          fi

          if [ -s changed_files.txt ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "Changed files to scan:"
            cat changed_files.txt
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "No relevant files changed"
          fi

      - name: Run Ferret Scan on changed files
        if: steps.scope.outputs.scope == 'changed-files' && steps.changed-files.outputs.has_files == 'true'
        run: |
          echo "🔍 Scanning changed files for sensitive data..."

          # Create results directory
          mkdir -p results

          # Scan each changed file
          exit_code=0
          high_findings=0
          medium_findings=0

          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Scanning: $file"

              # Run scan and capture results in JSON (for PR comments)
              if ./bin/ferret-scan \
                --file "$file" \
                --confidence "${{ steps.scope.outputs.confidence }}" \
                --format json \
                --no-color \
                --quiet > "results/${file//\//_}.json" 2>/dev/null; then

                # Count findings (handle both array and object formats)
                file_high=$(jq -r 'if type == "array" then .[] else .results[]? end | select(.confidence == "HIGH") | .confidence' "results/${file//\//_}.json" 2>/dev/null | wc -l || echo "0")
                file_medium=$(jq -r 'if type == "array" then .[] else .results[]? end | select(.confidence == "MEDIUM") | .confidence' "results/${file//\//_}.json" 2>/dev/null | wc -l || echo "0")

                high_findings=$((high_findings + file_high))
                medium_findings=$((medium_findings + file_medium))

                if [ "$file_high" -gt 0 ] || [ "$file_medium" -gt 0 ]; then
                  echo "  ⚠️  Found $file_high high + $file_medium medium confidence findings"
                fi
              else
                echo "  ❌ Scan failed for $file"
                exit_code=1
              fi
            fi
          done < changed_files.txt

          # Combine all results for JSON (handle both array and object formats)
          echo '{"results": []}' > results/combined.json
          for result_file in results/*.json; do
            if [ "$result_file" != "results/combined.json" ] && [ -f "$result_file" ]; then
              # Handle both array format [] and object format {results: []}
              jq -s '
                .[0].results +
                (if .[1] | type == "array" then .[1] else (.[1].results // []) end) |
                {results: .}
              ' results/combined.json "$result_file" > temp.json
              mv temp.json results/combined.json
            fi
          done

          # NOTE: Ferret Scan findings are intentionally NOT uploaded to the
          # GitHub Security tab as SARIF. They are scan results about arbitrary
          # repo content (test fixtures, example secrets, the scanner's own
          # output), not vulnerabilities in this repo's code — uploading them
          # buried the real dependency CVEs under thousands of "alerts". PII
          # findings surface via the PR comment below; the JSON is uploaded as
          # a build artifact. The Security tab is reserved for Trivy/Grype/
          # CodeQL (actual vulnerability scanners).

          # Generate summary
          echo "high_findings=$high_findings" >> $GITHUB_ENV
          echo "medium_findings=$medium_findings" >> $GITHUB_ENV
          echo "scan_exit_code=$exit_code" >> $GITHUB_ENV

          echo "📊 Scan Summary:"
          echo "   High confidence findings: $high_findings"
          echo "   Medium confidence findings: $medium_findings"

      - name: Run Ferret Scan on full repository
        if: steps.scope.outputs.scope == 'full-repository'
        run: |
          echo "🔍 Scanning full repository for sensitive data..."

          # Create results directory
          mkdir -p results

          # Use profile-based configuration if available.
          # Exclude VCS metadata, vendored deps, and our own output dir so the
          # scan doesn't flag .git/logs refs, node_modules, or results/*.json
          # as findings (that self-referential noise was the bulk of the old
          # alert count).
          scan_args_json=(
            "--file" "."
            "--recursive"
            "--exclude" "results/**"
            "--exclude" ".git/**"
            "--exclude" "node_modules/**"
            "--confidence" "${{ steps.scope.outputs.confidence }}"
            "--format" "json"
            "--output" "results/full-scan.json"
            "--no-color"
            "--quiet"
          )

          # Add config file if it exists
          if [ -f ".ferret-scan.yaml" ]; then
            scan_args_json+=("--config" ".ferret-scan.yaml")
            scan_args_json+=("--profile" "ci")
          elif [ -f "ferret-config.yaml" ]; then
            scan_args_json+=("--config" "ferret-config.yaml")
          fi

          # Run the scan in JSON format (for PR comments)
          if ./bin/ferret-scan "${scan_args_json[@]}"; then
            # Count findings (handle both array and object formats)
            high_findings=$(jq -r 'if type == "array" then .[] else .results[]? end | select(.confidence == "HIGH") | .confidence' results/full-scan.json 2>/dev/null | wc -l || echo "0")
            medium_findings=$(jq -r 'if type == "array" then .[] else .results[]? end | select(.confidence == "MEDIUM") | .confidence' results/full-scan.json 2>/dev/null | wc -l || echo "0")

            echo "high_findings=$high_findings" >> $GITHUB_ENV
            echo "medium_findings=$medium_findings" >> $GITHUB_ENV
            echo "scan_exit_code=0" >> $GITHUB_ENV

            echo "📊 Full Repository Scan Summary:"
            echo "   High confidence findings: $high_findings"
            echo "   Medium confidence findings: $medium_findings"
          else
            echo "scan_exit_code=1" >> $GITHUB_ENV
            echo "❌ Full repository scan failed"
          fi

          # SARIF generation + upload removed: see the note in the changed-files
          # step. Ferret Scan PII findings are not code-vulnerability alerts and
          # are not published to the GitHub Security tab.

      - name: Create PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // Read results (using new .results format)
            let findings = [];
            try {
              if (fs.existsSync('results/combined.json')) {
                const data = JSON.parse(fs.readFileSync('results/combined.json', 'utf8'));
                findings = data.results || [];
              } else if (fs.existsSync('results/full-scan.json')) {
                const data = JSON.parse(fs.readFileSync('results/full-scan.json', 'utf8'));
                findings = data.results || [];
              }
            } catch (e) {
              console.log('No results file found or error reading results');
            }

            const highFindings = process.env.high_findings || '0';
            const mediumFindings = process.env.medium_findings || '0';
            const scanExitCode = process.env.scan_exit_code || '0';

            // Create comment body
            let commentBody = '## 🔍 Ferret Scan Results\n\n';

            if (scanExitCode !== '0') {
              commentBody += '❌ **Scan failed** - Please check the workflow logs for details.\n\n';
            } else if (highFindings === '0' && mediumFindings === '0') {
              commentBody += '✅ **No sensitive data detected** in the changed files.\n\n';
            } else {
              commentBody += `⚠️ **Sensitive data detected:**\n`;
              commentBody += `- High confidence: ${highFindings} findings\n`;
              commentBody += `- Medium confidence: ${mediumFindings} findings\n\n`;

              if (findings.length > 0) {
                commentBody += '### Findings Summary:\n\n';
                commentBody += '| File | Type | Confidence | Line |\n';
                commentBody += '|------|------|------------|------|\n';

                findings.slice(0, 10).forEach(finding => {
                  const file = finding.filename || 'Unknown';
                  const type = finding.type || 'Unknown';
                  const confidence = finding.confidence || 'Unknown';
                  const line = finding.line_number || 'N/A';
                  commentBody += `| ${file} | ${type} | ${confidence} | ${line} |\n`;
                });

                if (findings.length > 10) {
                  commentBody += `\n*... and ${findings.length - 10} more findings*\n`;
                }
              }

              commentBody += '\n### Next Steps:\n';
              commentBody += '1. Review the findings above\n';
              commentBody += '2. Remove or redact any actual sensitive data\n';
              commentBody += '3. Add suppressions for false positives\n';
              commentBody += '4. Re-run the scan after making changes\n';
            }

            commentBody += '\n---\n';
            commentBody += '*🤖 This comment was automatically generated by Ferret Scan*';

            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ferret-scan-results
          path: |
            results/
          retention-days: 30

      - name: Fail on high confidence findings
        if: env.high_findings != '0'
        run: |
          echo "❌ Blocking merge: ${{ env.high_findings }} high confidence sensitive data findings detected"
          echo "Please review and address the findings before merging this PR"
          exit 1
